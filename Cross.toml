# Cross-compilation configuration for cross-rs
# https://github.com/cross-rs/cross

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update && apt-get install --assume-yes libdbus-1-dev:arm64 pkg-config"
]

[target.aarch64-unknown-linux-gnu.env]
PKG_CONFIG_PATH = "/usr/lib/aarch64-linux-gnu/pkgconfig"
PKG_CONFIG_LIBDIR = "/usr/lib/aarch64-linux-gnu/pkgconfig"
PKG_CONFIG_SYSROOT_DIR = "/"

[build.env]
passthrough = [
    "RUST_LOG",
    # Build id computed on the host by scripts/build-rpi4.sh and read by
    # build.rs (the cross container has no git / tags of its own).
    "GIT_DESCRIBE",
]
