name: Renovate

# Self-hosted Renovate run (no GitHub App). Uses the RENOVATE_TOKEN secret
# (a PAT with repo + workflow scope) and the repo's renovate.json.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          configurationFile: renovate.json
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          GIT_AUTHOR_NAME: micschr0
          GIT_AUTHOR_EMAIL: 61987798+micschr0@users.noreply.github.com
          GIT_COMMITTER_NAME: micschr0
          GIT_COMMITTER_EMAIL: 61987798+micschr0@users.noreply.github.com
