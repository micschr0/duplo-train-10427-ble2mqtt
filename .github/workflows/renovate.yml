name: Renovate

# Self-hosted Renovate run (no GitHub App). Uses the RENOVATE_TOKEN secret
# (a PAT with repo + workflow scope) and the repo's renovate.json.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: renovate.json
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          GIT_AUTHOR_NAME: micschr0
          GIT_AUTHOR_EMAIL: 61987798+micschr0@users.noreply.github.com
          GIT_COMMITTER_NAME: micschr0
          GIT_COMMITTER_EMAIL: 61987798+micschr0@users.noreply.github.com
